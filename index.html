<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Khmer AI Voice</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:40px;
}

.box{
  width:420px;
  background:#111827;
  padding:20px;
  border-radius:15px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#38bdf8;
  border:none;
  cursor:pointer;
}

audio{
  width:100%;
}
</style>
</head>

<body>

<div class="box">

<h2>🎤 Khmer AI Voice</h2>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<hr>

<!-- TEXT TO SPEECH -->
<textarea id="text" placeholder="Type text"></textarea>
<button onclick="speak()">🔊 Speak</button>

<audio id="audio" controls></audio>

<hr>

<!-- RECORD VOICE -->
<h3>🎙 Record Voice</h3>

<button onclick="startRecord()">Start Record</button>
<button onclick="stopRecord()">Stop & Upload</button>

<audio id="preview" controls></audio>

<p id="status"></p>

</div>

<script src="app.js"></script>

</body>
</html>
